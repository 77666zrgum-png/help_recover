name: Flutter Build APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: any
          channel: 'stable'

      - name: Recreate Project Clean and Stable
        run: |
          # 1. كتابة ملف pubspec القياسي المنسق
          cat << 'EOF' > pubspec.yaml
          name: help_recover
          description: "A new Flutter project for account recovery support."
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            url_launcher: ^6.2.5
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
            assets:
              - assets/bg_image.png
          EOF
          
          # 2. توليد بيئة أندرويد نظيفة ومستقرة تماماً من الصفر
          rm -rf android
          flutter create . --platforms=android --org=com.mohammed --project-name=help_recover
          flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
