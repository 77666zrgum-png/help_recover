name: Flutter Build APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: any
          channel: 'stable'

      - name: Recreate Project and Set Brand Name
        run: |
          # 1. إعادة توليد ملف pubspec الافتراضي المستقر لمنع خطأ التعارض
          cat << 'EOF' > pubspec.yaml
          name: help_recover
          description: "A new Flutter project for account recovery support."
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            url_launcher: ^6.2.5
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
            assets:
              - assets/bg_image.png
          EOF
          
          # 2. بناء مجلد أندرويد نظيف ومستقر كلياً
          rm -rf android
          flutter create . --platforms=android --org=com.mohammed
          flutter pub get
          
          # 3. حقن الاسم التسويقي الرسمي تحت الأيقونة في واجهة الهاتف الخارجي بالملي
          sed -i 's/android:label="help_recover"/android:label="استرجاع حساب انستغرام وفيسبوك وتكتوك"/g' android/app/src/main/AndroidManifest.xml
          
          # 4. حقن أذونات جدار حماية الأندرويد للمتصفح لمنع حظر الروابط
          sed -i '/<application/i \    <queries>\n        <intent>\n            <action android:name="android.intent.action.VIEW" />\n            <category android:name="android.intent.category.BROWSABLE" />\n            <data android:scheme="https" />\n        </intent>\n        <intent>\n            <action android:name="android.intent.action.VIEW" />\n            <category android:name="android.intent.category.BROWSABLE" />\n            <data android:scheme="http" />\n        </intent>\n    </queries>\n' android/app/src/main/AndroidManifest.xml

      - name: Build Debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
